<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .azan-header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .azan-info { display: flex; align-items: center; gap: 12px; }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .azan-status { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .azan-btn.playing { background: #ff4d4d; color: #fff; }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .prayer-item { text-align: center; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.02); }
        .prayer-item.next-prayer { border: 1px solid var(--accent-color); background: rgba(0, 245, 212, 0.1); }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .menu-box:hover { background: #222f54; }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header><h1>طمئن قلبك 🤍</h1></header>

    <div class="main-container">
        <div class="azan-bar">
            <div class="azan-header-container">
                <div class="azan-info">
                    <span>🕌</span>
                    <div>
                        <div class="azan-title">نظام المواقيت والآذان التلقائي</div>
                        <div id="azanStatus" class="azan-status">انقر في أي مكان لتفعيل الأذان 🔔</div>
                    </div>
                </div>
                <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع تجريبي</button>
            </div>
            <div class="prayer-times-grid">
                <div class="prayer-item" id="p-fajr">الفجر<br><b>04:10</b></div>
                <div class="prayer-item" id="p-dhuhr">الظهر<br><b>12:55</b></div>
                <div class="prayer-item" id="p-asr">العصر<br><b>16:30</b></div>
                <div class="prayer-item" id="p-maghrib">المغرب<br><b>19:55</b></div>
                <div class="prayer-item" id="p-isha">العشاء<br><b>21:30</b></div>
            </div>
        </div>

        <audio id="azanAudio" src="https://assets.mixkit.co/active_storage/sfx/1993/1993-84.wav" preload="auto"></audio>

        <div id="mainMenu">
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء</div>
        </div>
        <div id="companionsSection" class="content-section">...</div>
    </div>

    <script>
        const azanAudio = document.getElementById("azanAudio");
        const azanStatus = document.getElementById("azanStatus");
        let isAudioAllowed = false;

        function enableAudioContext() {
            if (!isAudioAllowed) {
                azanAudio.play().then(() => {
                    azanAudio.pause();
                    isAudioAllowed = true;
                    azanStatus.innerText = "نظام الأذان مفعل ✅";
                }).catch(() => {});
            }
        }

        function toggleAzan(e) {
            e.stopPropagation();
            if (azanAudio.paused) {
                azanAudio.play();
                document.getElementById("azanPlayBtn").innerText = "⏸ إيقاف";
            } else {
                azanAudio.pause();
                azanAudio.currentTime = 0;
                document.getElementById("azanPlayBtn").innerText = "▶ استماع تجريبي";
            }
        }

        function checkClockForAzan() {
            const now = new Date();
            const times = [
                { h: 4, m: 10 }, { h: 12, m: 55 }, { h: 16, m: 30 }, { h: 19, m: 55 }, { h: 21, m: 30 }
            ];
            times.forEach(t => {
                if (now.getHours() === t.h && now.getMinutes() === t.m && now.getSeconds() === 0) {
                    azanAudio.play();
                }
            });
        }
        setInterval(checkClockForAzan, 1000);

        function showSection(id) { document.getElementById('mainMenu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    </script>
</body>
</html>

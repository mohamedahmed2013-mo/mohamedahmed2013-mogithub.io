<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك - النسخة الكاملة</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; }
        /* هذا هو السر: إخفاء كل الأقسام عند البدء */
        .content-section { display: none; }
        .menu-box { background: var(--card-bg); padding: 20px; margin: 10px; border-radius: 10px; cursor: pointer; text-align: center; border: 1px solid var(--primary-color); }
    </style>
</head>
<body>

    <div id="mainMenu">
        <div class="menu-box" onclick="showSection('azanSection')">🕌 نظام المواقيت والآذان</div>
        <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
        <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر</div>
        <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة</div>
    </div>

    <div id="azanSection" class="content-section">
        <button onclick="showMenu()">↩ رجوع</button>
        <h2>نظام الآذان</h2>
        <p>هنا ستظهر المواقيت وتفعيل الصوت...</p>
    </div>

    <div id="azkarSection" class="content-section">
        <button onclick="showMenu()">↩ رجوع</button>
        <h2>الأذكار اليومية</h2>
        <div id="zkrDisplay">الذكر يظهر هنا</div>
        <button onclick="countZkr()">تسبيح</button>
    </div>

    <div id="feelingsSection" class="content-section">
        <button onclick="showMenu()">↩ رجوع</button>
        <h2>محرك المشاعر</h2>
        </div>

    <div id="companionsSection" class="content-section">
        <button onclick="showMenu()">↩ رجوع</button>
        <h2>موسوعة الصحابة</h2>
        <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي...">
        <div id="companionsGrid"></div>
    </div>

    <script>
        // المحرك: دالة التنقل
        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function showMenu() {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('mainMenu').style.display = 'block';
        }

        // هنا يجب أن تضع منطقك الأصلي الذي كان في ملفك
        function filterCompanions() {
            // منطق البحث الخاص بك
            console.log("البحث يعمل...");
        }

        function countZkr() {
            // منطق العداد
            alert("تم التسبيح");
        }
    </script>
</body>
</html>

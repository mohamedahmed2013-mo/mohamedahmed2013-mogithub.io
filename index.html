<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <style>
        :root {
            --bg-color: #00040a;
            --card-bg: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .azan-header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .azan-info { display: flex; align-items: center; gap: 12px; }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .azan-status { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .azan-btn:hover { background: var(--accent-color); transform: scale(1.03); }
        .azan-btn.playing { background: #ff4d4d; color: #fff; }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .prayer-item { text-align: center; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.02); }
        .prayer-item.next-prayer { border: 1px solid var(--accent-color); background: rgba(0, 245, 212, 0.1); }
        .prayer-name { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .prayer-time { font-size: 1rem; font-weight: bold; color: #fff; }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--text-color); cursor: pointer; border: 2px solid transparent; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .menu-box:hover { border-color: var(--primary-color); transform: translateY(-3px); background: #222f54; }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .azkar-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 8px 18px; border-radius: 10px; border: 2px solid var(--primary-color); background: transparent; color: #fff; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--primary-color); color: #000; }
        .azkar-box { background: rgba(10, 17, 40, 0.6); padding: 20px; border-radius: 15px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; }
        .zkr-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 10px; color: #fff; }
        .zkr-reward { font-size: 0.95rem; color: var(--highlight); }
        .azkar-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn { padding: 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .counter-btn { flex: 1; max-width: 180px; padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: #000; font-size: 1.2rem; font-weight: bold; cursor: pointer; direction: ltr; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0a1128; color: #fff; font-size: 1rem; }
        .search-btn { padding: 0 20px; border-radius: 10px; border: none; background: var(--primary-color); color: #000; font-weight: bold; cursor: pointer; }
        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; max-height: 550px; overflow-y: auto; padding-right: 5px; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; transition: all 0.2s ease; }
        .companion-card:hover { transform: translateY(-2px); background: #131f42; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 750px; width: 100%; border-radius: 20px; padding: 30px; border: 2px solid var(--primary-color); position: relative; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="color: #94a3b8;">موسوعة السيرة النبوية وبستان الصحابة الأجلاء</p>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div class="azan-header-container">
                <div class="azan-info">
                    <span style="font-size: 1.8rem;">🕌</span>
                    <div>
                        <div class="azan-title">نظام المواقيت والآذان</div>
                        <div id="azanStatus" class="azan-status">اضغط بالشاشة لتشغيل الأذان 🔔</div>
                    </div>
                </div>
                <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع تجريبي</button>
            </div>
            <div class="prayer-times-grid">
                <div class="prayer-item" id="p-fajr"><div class="prayer-name">الفجر</div><div class="prayer-time" id="t-fajr">04:10 ص</div></div>
                <div class="prayer-item" id="p-dhuhr"><div class="prayer-name">الظهر</div><div class="prayer-time" id="t-dhuhr">12:55 م</div></div>
                <div class="prayer-item" id="p-asr"><div class="prayer-name">العصر</div><div class="prayer-time" id="t-asr">04:30 م</div></div>
                <div class="prayer-item" id="p-maghrib"><div class="prayer-name">المغرب</div><div class="prayer-time" id="t-maghrib">07:55 م</div></div>
                <div class="prayer-item" id="p-isha"><div class="prayer-name">العشاء</div><div class="prayer-time" id="t-isha">09:30 م</div></div>
            </div>
        </div>

        <audio id="azanAudio" src="https://assets.mixkit.co/active_storage/sfx/1993/1993-84.wav" preload="auto"></audio>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية والورد المحصن</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء</div>
        </div>

        <div id="azkarSection" class="content-section">...</div>
        <div id="feelingsSection" class="content-section">...</div>

        <div id="companionsSection" class="content-section">
            <h2 class="box-title">🕌 سير الصحابة <button class="back-btn" onclick="showMenu()">رجوع</button></h2>
            <div class="search-box">
                <input type="text" id="companionInput" oninput="filterCompanions()" placeholder="ابحث باسم الصحابي...">
            </div>
            <div id="companionsGrid" class="companions-grid"></div>
        </div>
    </div>

    <div id="companionModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal(null)">×</button>
            <h2 id="modalTitle" style="color:var(--accent-color)"></h2>
            <h4 id="modalSubtitle" style="color:var(--highlight); margin-bottom:15px"></h4>
            <div id="modalBody" style="line-height:1.8; font-size:1.1rem"></div>
        </div>
    </div>

    <script>
        const companionsData = [
            {
                name: "أبو بكر الصديق",
                title: "الخليفة الأول وصاحب الغار",
                story: "هو عبد الله بن أبي قحافة، أول من أسلم من الرجال الأحرار. كان أعظم أصحاب النبي ﷺ منزلة، ورفيقه في الهجرة. لُقب بـ 'الصديق' لأنه صدّق النبي في حادثة الإسراء والمعراج. اتصف بالرحمة واللين، لكنه كان صلبًا في مواجهة المرتدين لحماية أركان الدولة الإسلامية. أنفق ماله كله في سبيل الله، وكان النبي يقول عنه: 'لو كنت متخذاً خليلاً غير ربي لاتخذت أبا بكر خليلاً'. رحلته في الإسلام كانت سلسلة من التضحيات العظيمة التي لا تُنسى."
            },
            {
                name: "عمر بن الخطاب",
                title: "الفاروق وأمير المؤمنين",
                story: "هو عمر بن الخطاب، الفاروق الذي فرق الله به بين الحق والباطل. كان إسلامه نصراً للإسلام وعزة للمسلمين. عُرف بشجاعته الفائقة وعدله الذي ضرب به الأمثال في التاريخ. في عهده توسعت الدولة الإسلامية بشكل كبير وشملت الشام وفارس ومصر. كان لا ينام الليل يتفقد أحوال الرعية، ويخشى الله في كل صغيرة وكبيرة. قال عنه النبي ﷺ: 'لو كان بعدي نبي لكان عمر'، فكان ملهماً ومسدداً في رأيه وقراراته."
            }
        ];

        function renderCompanions() {
            const grid = document.getElementById("companionsGrid");
            grid.innerHTML = "";
            companionsData.forEach((comp, idx) => {
                const card = document.createElement("div");
                card.className = "companion-card";
                card.setAttribute("data-name", comp.name.toLowerCase());
                card.onclick = () => openModal(idx);
                card.innerHTML = `<h3>${comp.name}</h3><h4>${comp.title}</h4>`;
                grid.appendChild(card);
            });
        }

        function openModal(idx) {
            const comp = companionsData[idx];
            document.getElementById("modalTitle").innerText = comp.name;
            document.getElementById("modalSubtitle").innerText = comp.title;
            document.getElementById("modalBody").innerText = comp.story;
            document.getElementById("companionModal").style.display = "flex";
        }

        function closeModal(event) { if (!event || event.target.id === "companionModal") document.getElementById("companionModal").style.display = "none"; }
        
        function showSection(id) {
            document.getElementById("mainMenu").style.display = "none";
            document.getElementById(id).style.display = "block";
        }
        function showMenu() {
            document.querySelectorAll(".content-section").forEach(s => s.style.display = "none");
            document.getElementById("mainMenu").style.display = "flex";
        }

        window.onload = renderCompanions;
    </script>
</body>
</html>

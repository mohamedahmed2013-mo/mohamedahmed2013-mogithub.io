<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الكاملة</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .box { background: var(--card-bg); padding: 20px; margin-bottom: 15px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid var(--primary-color); }
        .section { display: none; background: var(--card-bg); padding: 25px; border-radius: 20px; }
        .azan-bar { background: #132247; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="azan-bar">
        <audio id="azanAudio" src="azan.mp3"></audio>
        <button id="playBtn" style="padding:10px 20px; cursor:pointer;">▶ تشغيل / إيقاف الأذان</button>
    </div>

    <div id="mainMenu">
        <div class="box" onclick="show('azkarSection')">🌅 الأذكار اليومية</div>
        <div class="box" onclick="show('feelingsSection')">🩹 محرك المشاعر</div>
        <div class="box" onclick="show('companionsSection')">🕌 سير الصحابة</div>
    </div>

    <div id="azkarSection" class="section"><h2>الأذكار</h2><button onclick="hide()">رجوع</button></div>
    <div id="feelingsSection" class="section"><h2>المشاعر</h2><button onclick="hide()">رجوع</button></div>
    <div id="companionsSection" class="section"><h2>الصحابة</h2><button onclick="hide()">رجوع</button></div>
</div>

<script>
    // نظام الأذان
    const audio = document.getElementById("azanAudio");
    document.getElementById("playBtn").onclick = function() {
        if(audio.paused) { audio.play(); } else { audio.pause(); audio.currentTime = 0; }
    };

    // نظام التنقل (الدوال الأساسية)
    function show(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function hide() {
        document.getElementById('mainMenu').style.display = 'block';
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    }
</script>

</body>
</html>

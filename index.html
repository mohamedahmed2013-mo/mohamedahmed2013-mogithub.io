<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - نظام الآذان</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .azan-bar { background: #132247; border: 1px solid var(--primary-color); border-radius: 15px; padding: 20px; width: 100%; max-width: 500px; text-align: center; }
        .azan-btn { background: var(--primary-color); border: none; padding: 10px 20px; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; font-size: 0.8rem; }
        .prayer-item { background: rgba(255,255,255,0.1); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div class="azan-bar">
        <h3>نظام الآذان (الإسكندرية)</h3>
        <p id="statusMsg">اضغط في أي مكان لتفعيل الصوت</p>
        <button id="azanPlayBtn" class="azan-btn" onclick="manualToggle(event)">▶ استماع تجريبي</button>
        
        <div class="prayer-times-grid">
            <div class="prayer-item">الفجر<br><span id="t-Fajr">--:--</span></div>
            <div class="prayer-item">الظهر<br><span id="t-Dhuhr">--:--</span></div>
            <div class="prayer-item">العصر<br><span id="t-Asr">--:--</span></div>
            <div class="prayer-item">المغرب<br><span id="t-Maghrib">--:--</span></div>
            <div class="prayer-item">العشاء<br><span id="t-Isha">--:--</span></div>
        </div>
    </div>

    <audio id="azanAudio" src="https://server11.mp3quran.net/adhan/001.mp3"></audio>

    <script>
        const audio = document.getElementById("azanAudio");
        const playBtn = document.getElementById("azanPlayBtn");
        let unlocked = false;
        let prayerTimes = {};

        // 1. تفعيل الصوت عند أول ضغطة
        function unlockAudio() {
            if (!unlocked) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    unlocked = true;
                    document.getElementById("statusMsg").innerText = "النظام جاهز ✅";
                }).catch(() => {});
            }
        }

        // 2. التشغيل اليدوي
        function manualToggle(event) {
            event.stopPropagation();
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸ إيقاف";
            } else {
                audio.pause();
                audio.currentTime = 0;
                playBtn.innerText = "▶ استماع تجريبي";
            }
        }

        // 3. جلب مواقيت الصلاة من API
        async function fetchPrayerTimes() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Alexandria&country=Egypt&method=5');
                const data = await res.json();
                prayerTimes = data.data.timings;
                document.getElementById('t-Fajr').innerText = prayerTimes.Fajr;
                document.getElementById('t-Dhuhr').innerText = prayerTimes.Dhuhr;
                document.getElementById('t-Asr').innerText = prayerTimes.Asr;
                document.getElementById('t-Maghrib').innerText = prayerTimes.Maghrib;
                document.getElementById('t-Isha').innerText = prayerTimes.Isha;
            } catch (e) { console.error("فشل جلب المواقيت"); }
        }

        // 4. التحقق من وقت الآذان
        function checkTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (unlocked && (timeStr === prayerTimes.Fajr || timeStr === prayerTimes.Dhuhr || timeStr === prayerTimes.Asr || timeStr === prayerTimes.Maghrib || timeStr === prayerTimes.Isha)) {
                if (audio.paused) audio.play();
            }
        }

        audio.onended = () => { playBtn.innerText = "▶ استماع تجريبي"; };
        fetchPrayerTimes();
        setInterval(checkTime, 30000);
    </script>
</body>
</html>

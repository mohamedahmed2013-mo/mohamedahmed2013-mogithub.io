<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك - الموسوعة الكاملة</title>
    <style>
        /* (استخدم نفس الستايل السابق الذي أرسلته لك في رسالتك) */
        /* تأكد من إضافة ستايل الـ modal و companions-grid */
    </style>
</head>
<body onclick="enableAudioContext()">

    <script>
        // دمج كافة الوظائف البرمجية
        const companionsData = [
            { name: "أبو بكر الصديق", title: "رفيق الغار", story: "قصة أبو بكر كاملة هنا..." },
            { name: "عمر بن الخطاب", title: "الفاروق", story: "قصة عمر كاملة هنا..." },
            // أضف بقية الصحابة بنفس التنسيق
        ];

        // وظيفة عرض الصحابة
        function renderCompanions(filter = "") {
            const grid = document.getElementById('companionsGrid');
            grid.innerHTML = "";
            companionsData.filter(c => c.name.includes(filter)).forEach(comp => {
                const card = document.createElement('div');
                card.className = 'companion-card';
                card.innerHTML = `<h3>${comp.name}</h3><h4>${comp.title}</h4>`;
                card.onclick = () => openModal(comp);
                grid.appendChild(card);
            });
        }

        function openModal(comp) {
            document.getElementById('modalTitle').innerText = comp.name;
            document.getElementById('modalSubtitle').innerText = comp.title;
            document.getElementById('modalBody').innerHTML = comp.story;
            document.getElementById('companionModal').style.display = 'flex';
        }

        function closeModal(e) {
            if(!e || e.target.className === 'modal-close' || e.target.className === 'modal-overlay')
                document.getElementById('companionModal').style.display = 'none';
        }

        // تفعيل أول تحميل
        renderCompanions();
    </script>
</body>
</html>

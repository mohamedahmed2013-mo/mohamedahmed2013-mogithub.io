<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; --highlight: #ffd166; --success-color: #2a9d8f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .menu-box:hover { border-color: var(--primary-color); transform: translateY(-3px); background: #222f54; }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <div class="main-container">
        <div class="azan-bar">
            <div id="azanStatus">اضغط في أي مكان لتنشيط الصوت 🔔</div>
            <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع تجريبي</button>
            <audio id="azanAudio" src="azan.mp3"></audio>
        </div>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
            <div class="menu-box" onclick="showSection('feelingsSection')">🩹 محرك المشاعر</div>
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة</div>
        </div>

        <div id="azkarSection" class="content-section"><h2>الأذكار <button onclick="showMenu()">رجوع ↩</button></h2></div>
        <div id="feelingsSection" class="content-section"><h2>المشاعر <button onclick="showMenu()">رجوع ↩</button></h2></div>
        <div id="companionsSection" class="content-section"><h2>الصحابة <button onclick="showMenu()">رجوع ↩</button></h2></div>
    </div>

    <script>
        // دالة تفعيل الصوت (من كودك الأول)
        const azanAudio = document.getElementById("azanAudio");
        let isAudioAllowed = false;
        function enableAudioContext() {
            if (!isAudioAllowed) {
                azanAudio.play().then(() => { azanAudio.pause(); azanAudio.currentTime = 0; isAudioAllowed = true; }).catch(() => {});
            }
        }
        function toggleAzan(event) {
            event.stopPropagation();
            if (azanAudio.paused) { azanAudio.play(); } else { azanAudio.pause(); azanAudio.currentTime = 0; }
        }

        // دوال التنقل (من كودك الثاني)
        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function showMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النظام المتكامل</title>
    <style>
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .content-section { display: none; width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 15px; }
        .menu-box { background: var(--card-bg); padding: 20px; margin: 10px; border-radius: 10px; cursor: pointer; text-align: center; width: 80%; border: 1px solid var(--primary-color); }
        .counter-btn { padding: 15px; background: var(--primary-color); border: none; border-radius: 10px; color: #fff; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body onclick="unlockAudio()">

    <h1>طمئن قلبك 🤍</h1>
    
    <div id="mainMenu" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="menu-box" onclick="showSection('azkarSection')">🌅 الأذكار اليومية</div>
        <button id="azanBtn" class="counter-btn" onclick="toggleAzan()">▶ تشغيل الأذان التجريبي</button>
    </div>

    <div id="azkarSection" class="content-section">
        <button onclick="hideSection()">رجوع ↩</button>
        <div id="zkrText" style="margin: 20px 0; font-size: 1.3rem; line-height: 1.6; text-align: center;">تحميل...</div>
        <div style="text-align: center;">
            <button class="counter-btn" onclick="countZkr()" id="counterBtn">0 / 0</button>
        </div>
    </div>

    <audio id="azanAudio" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        // 1. نظام الصوت
        const audio = document.getElementById("azanAudio");
        let audioUnlocked = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                audio.play().then(() => {
                    audio.pause();
                    audioUnlocked = true;
                }).catch(() => {});
            }
        }

        function toggleAzan() {
            if (audio.paused) { audio.play(); } 
            else { audio.pause(); audio.currentTime = 0; }
        }

        // 2. قاعدة بيانات الأذكار
        const azkarData = {
            morning: [
                { text: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ", count: 1 },
                { text: "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء", count: 3 },
                { text: "أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله", count: 1 }
            ]
        };

        let zkrIndex = 0;
        let currentCount = 0;

        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            updateZkr();
        }

        function hideSection() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('azkarSection').style.display = 'none';
        }

        function updateZkr() {
            const zkr = azkarData.morning[zkrIndex];
            document.getElementById('zkrText').innerText = zkr.text;
            document.getElementById('counterBtn').innerText = `${currentCount} / ${zkr.count}`;
        }

        function countZkr() {
            const target = azkarData.morning[zkrIndex].count;
            if (currentCount < target) {
                currentCount++;
            } else {
                currentCount = 0;
                zkrIndex = (zkrIndex + 1) % azkarData.morning.length;
            }
            updateZkr();
        }
    </script>
</body>
</html>

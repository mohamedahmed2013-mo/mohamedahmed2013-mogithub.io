<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <!-- تم الحفاظ على كافة تنسيقات CSS الأصلية الخاصة بك كما هي لضمان التصميم -->
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .azan-header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .azan-info { display: flex; align-items: center; gap: 12px; }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .azan-status { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .azan-btn:hover { background: var(--accent-color); transform: scale(1.03); }
        .azan-btn.playing { background: #ff4d4d; color: #fff; }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .prayer-item { text-align: center; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.02); }
        .prayer-item.next-prayer { border: 1px solid var(--accent-color); background: rgba(0, 245, 212, 0.1); }
        .prayer-name { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .prayer-time { font-size: 1rem; font-weight: bold; color: #fff; }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; color: var(--text-color); cursor: pointer; border: 2px solid transparent; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .menu-box:hover { border-color: var(--primary-color); transform: translateY(-3px); background: #222f54; }
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .box-title { color: var(--accent-color); font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); max-width: 750px; width: 100%; border-radius: 20px; padding: 30px; border: 2px solid var(--primary-color); position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 1.2rem; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .modal-title { color: var(--accent-color); font-size: 1.8rem; margin-bottom: 5px; }
        .modal-body { font-size: 1.15rem; line-height: 1.9; color: #e2e8f0; text-align: justify; }
        .companions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .companion-card { background: #0a1128; padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary-color); cursor: pointer; transition: 0.2s; }
        .companion-card:hover { border-right-color: var(--accent-color); }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header>
        <h1>طمئن قلبك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">موسوعة السيرة النبوية العطرة وبستان الصحابة الأجلاء</p>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div class="azan-header-container">
                <div class="azan-info">
                    <span style="font-size: 1.8rem;">🕌</span>
                    <div>
                        <div class="azan-title">نظام المواقيت والآذان التلقائي</div>
                        <div id="azanStatus" class="azan-status">اضغط في أي مكان بالشاشة لتشغيل الأذان التلقائي 🔔</div>
                    </div>
                </div>
                <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع تجريبي</button>
            </div>
            <div class="prayer-times-grid">
                <div class="prayer-item" id="p-fajr"><div class="prayer-name">الفجر</div><div class="prayer-time">04:10 ص</div></div>
                <div class="prayer-item" id="p-dhuhr"><div class="prayer-name">الظهر</div><div class="prayer-time">12:55 م</div></div>
                <div class="prayer-item" id="p-asr"><div class="prayer-name">العصر</div><div class="prayer-time">04:30 م</div></div>
                <div class="prayer-item" id="p-maghrib"><div class="prayer-name">المغرب</div><div class="prayer-time">07:55 م</div></div>
                <div class="prayer-item" id="p-isha"><div class="prayer-name">العشاء</div><div class="prayer-time">09:30 م</div></div>
            </div>
        </div>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="menu-box" onclick="showSection('companionsSection')">🕌 سير الصحابة العظماء (موسوعة شاملة)</div>
        </div>

        <div id="companionsSection" class="content-section" style="display: block;">
            <h2 class="box-title">🕌 سير الصحابة العظماء ومواقفهم</h2>
            <div id="companionsGrid" class="companions-grid"></div>
        </div>
    </div>

    <div id="companionModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2 id="modalTitle" class="modal-title"></h2>
            <h4 id="modalSubtitle" style="color: var(--highlight); margin-bottom: 20px;"></h4>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        const companionsData = [
            { 
                name: "الزبير بن العوام", 
                title: "حواري رسول الله ﷺ، وفارس مكة الشجاع المغوار", 
                story: `<p>هو الزبير بن العوام بن خويلد الأسدي القرشي، ابن عمة النبي ﷺ (صفية بنت عبد المطلب)، وأحد العشرة المبشرين بالجنة. أسلم وهو ابن اثنتي عشرة سنة، وكان أول من سل سيفاً في سبيل الله في الإسلام حين سرت إشاعة في مكة أن النبي قُتل، فخرج شاداً سيفه حتى لقيه النبي ودعا له.</p><p>شهد المشاهد كلها مع النبي ﷺ، وكان فارساً مقداماً لا يشق له غبار. يوم الخندق، عندما اشتد الكرب، قال النبي ﷺ: "من يأتينا بخبر بني قريظة؟" فقال الزبير: "أنا"، فذهب وجاء بالخبر، فقال له النبي ﷺ: "فداك أبي وأمي، إن لكل نبي حوارياً، وحواريي الزبير".</p>` 
            }
        ];

        function renderCompanions() {
            const grid = document.getElementById('companionsGrid');
            companionsData.forEach(c => {
                const div = document.createElement('div');
                div.className = 'companion-card';
                div.innerHTML = `<h3>${c.name}</h3><h4>${c.title}</h4>`;
                div.onclick = () => openModal(c);
                grid.appendChild(div);
            });
        }

        function openModal(c) {
            document.getElementById('modalTitle').innerText = c.name;
            document.getElementById('modalSubtitle').innerText = c.title;
            document.getElementById('modalBody').innerHTML = c.story;
            document.getElementById('companionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('companionModal').style.display = 'none'; }
        
        // تشغيل التهيئة
        renderCompanions();
        
        function enableAudioContext() { /* وظيفة تفعيل الصوت */ }
        function toggleAzan(e) { e.stopPropagation(); }
    </script>
</body>
</html>

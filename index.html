<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك</title>
    <style>
        body { background: #0a1128; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #1c2541; padding: 15px; margin: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #00b4d8; }
        .section { display: none; background: #1c2541; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body onclick="document.getElementById('audio').play();">

    <div id="menu">
        <h1>طمئن قلبك 🤍</h1>
        <div class="box" onclick="show('azkar')">🌅 الأذكار</div>
        <div class="box" onclick="show('feelings')">🩹 المشاعر</div>
        <div class="box" onclick="show('companions')">🕌 الصحابة</div>
        <button onclick="document.getElementById('audio').play()">🔔 تشغيل الأذان</button>
    </div>

    <div id="azkar" class="section">
        <button onclick="hide()">رجوع</button>
        <div id="zkr">سبحان الله (100 مرة)</div>
        <button onclick="alert('تم')">تم</button>
    </div>

    <div id="feelings" class="section">
        <button onclick="hide()">رجوع</button>
        <input id="fInput" placeholder="اكتب شعورك..">
        <button onclick="alert('الله يفرج همك')">بحث</button>
    </div>

    <div id="companions" class="section">
        <button onclick="hide()">رجوع</button>
        <div onclick="alert('أبو بكر: الصديق الأكبر')">أبو بكر الصديق</div>
    </div>

    <audio id="audio" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        function show(id) { document.getElementById('menu').style.display='none'; document.getElementById(id).style.display='block'; }
        function hide() { document.querySelectorAll('.section').forEach(s=>s.style.display='none'); document.getElementById('menu').style.display='block'; }
    </script>
</body>
</html>

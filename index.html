<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طمئن قلبك - النسخة الموسوعية الشاملة والمواقيت الدقيقة</title>
    <style>
        /* (تم الحفاظ على التنسيقات الأصلية الخاصة بك كما هي) */
        :root { --bg-color: #0a1128; --card-bg: #1c2541; --text-color: #f8fafc; --primary-color: #00b4d8; --accent-color: #00f5d4; --highlight: #ffd166; --success-color: #2a9d8f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 15px 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .azan-header-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .azan-info { display: flex; align-items: center; gap: 12px; }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.1rem; }
        .azan-status { font-size: 0.85rem; color: #94a3b8; margin-top: 3px; }
        .azan-btn { background: var(--primary-color); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .azan-btn:hover { background: var(--accent-color); transform: scale(1.03); }
        .azan-btn.playing { background: #ff4d4d; color: #fff; }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .prayer-item { text-align: center; padding: 8px; border-radius: 6px; background: rgba(255, 255, 255, 0.02); }
        .prayer-name { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
        .prayer-time { font-size: 1rem; font-weight: bold; color: #fff; }
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.3s ease; }
        .menu-box:hover { border-color: var(--primary-color); background: #222f54; }
    </style>
</head>
<body onclick="enableAudioContext()">

    <header>
        <h1>طمئن قلبك 🤍</h1>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div class="azan-header-container">
                <div class="azan-info">
                    <span style="font-size: 1.8rem;">🕌</span>
                    <div>
                        <div class="azan-title">نظام الأذان التلقائي</div>
                        <div id="azanStatus" class="azan-status">اضغط في أي مكان لتفعيل الصوت 🔔</div>
                    </div>
                </div>
                <button id="azanPlayBtn" class="azan-btn" onclick="toggleAzan(event)">▶ استماع تجريبي</button>
            </div>
            <div class="prayer-times-grid">
                <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time">04:10</div></div>
                <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time">12:55</div></div>
                <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time">16:30</div></div>
                <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time">19:55</div></div>
                <div class="prayer-item"><div class="prayer-name">العشاء</div><div class="prayer-time">21:30</div></div>
            </div>
        </div>
        <audio id="azanAudio" src="https://assets.mixkit.co/active_storage/sfx/1993/1993-84.wav"></audio>
    </div>

    <script>
        const azanAudio = document.getElementById("azanAudio");
        const azanStatus = document.getElementById("azanStatus");
        let isAudioAllowed = false;

        // تفعيل الصوت بعد أول لمسة للشاشة (شرط المتصفحات)
        function enableAudioContext() {
            if (!isAudioAllowed) {
                azanAudio.play().then(() => {
                    azanAudio.pause();
                    azanAudio.currentTime = 0;
                    isAudioAllowed = true;
                    azanStatus.innerText = "نظام الأذان مفعل وجاهز ✅";
                }).catch(() => {});
            }
        }

        function toggleAzan(e) {
            e.stopPropagation();
            if (azanAudio.paused) {
                azanAudio.play();
                azanStatus.innerText = "يعمل الآن...";
            } else {
                azanAudio.pause();
                azanAudio.currentTime = 0;
            }
        }

        // نظام مراقبة الوقت للأذان التلقائي
        const prayerTimes = [
            { h: 4, m: 10, name: "الفجر" },
            { h: 12, m: 55, name: "الظهر" },
            { h: 16, m: 30, name: "العصر" },
            { h: 19, m: 55, name: "المغرب" },
            { h: 21, m: 30, name: "العشاء" }
        ];

        function checkTime() {
            const now = new Date();
            const curH = now.getHours();
            const curM = now.getMinutes();
            const curS = now.getSeconds();

            if (curS === 0) {
                prayerTimes.forEach(p => {
                    if (p.h === curH && p.m === curM) {
                        azanAudio.play();
                        azanStatus.innerText = "حان الآن أذان صلاة " + p.name;
                    }
                });
            }
        }
        setInterval(checkTime, 1000);
    </script>
</body>
</html>

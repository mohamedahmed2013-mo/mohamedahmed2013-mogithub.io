<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك</title>
    <style>
        body { background: #0a1128; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1c2541; padding: 20px; margin: 10px auto; border-radius: 12px; cursor: pointer; border: 1px solid #00b4d8; width: 90%; max-width: 400px; }
        .sec { display: none; background: #1c2541; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; margin: auto; }
        button { cursor: pointer; padding: 10px; margin: 5px; }
    </style>
</head>
<body onclick="document.getElementById('a').play(); document.getElementById('a').pause();">

    <div id="m">
        <h1>طمئن قلبك 🤍</h1>
        <div class="box" onclick="v('z')">🌅 الأذكار</div>
        <div class="box" onclick="v('f')">🩹 المشاعر</div>
        <div class="box" onclick="v('c')">🕌 الصحابة</div>
        <button onclick="document.getElementById('a').play()">🔔 تشغيل الأذان</button>
    </div>

    <div id="z" class="sec">
        <button onclick="h()">رجوع</button>
        <h3>الأذكار</h3>
        <p>الصباح، المساء، النوم (جاهزة للعمل).</p>
    </div>

    <div id="f" class="sec">
        <button onclick="h()">رجوع</button>
        <h3>محرك المشاعر</h3>
        <p>مخنوق؟ استعن بالسجود.</p>
    </div>

    <div id="c" class="sec">
        <button onclick="h()">رجوع</button>
        <h3>الصحابة</h3>
        <p>أبو بكر، عمر، عثمان، علي.</p>
    </div>

    <audio id="a" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        function v(id) { document.getElementById('m').style.display='none'; document.getElementById(id).style.display='block'; }
        function h() { document.querySelectorAll('.sec').forEach(s=>s.style.display='none'); document.getElementById('m').style.display='block'; }
    </script>
</body>
</html>

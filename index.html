<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>آذان الإسكندرية</title>
</head>
<body style="background:#0a1128; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">

    <button id="mainBtn" style="padding:40px 80px; font-size:2rem; cursor:pointer; background:#00f5d4; border:none; border-radius:20px; font-weight:bold;">
        اضغط هنا للتشغيل
    </button>

    <audio id="myAudio" src="https://archive.org/download/Adhan_Madinah/Adhan_Madinah.mp3"></audio>

    <script>
        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("mainBtn");

        btn.onclick = () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = "يعمل الآن... (إيقاف؟)";
                btn.style.background = "#ff4d4d";
            } else {
                audio.pause();
                audio.currentTime = 0;
                btn.innerText = "اضغط هنا للتشغيل";
                btn.style.background = "#00f5d4";
            }
        };
    </script>
</body>
</html>

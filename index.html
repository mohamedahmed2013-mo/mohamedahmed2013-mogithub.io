<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك - النسخة المصححة</title>
    <style>
        /* تم دمج التنسيقات السابقة للحفاظ على الشكل */
        body { background-color: #0a1128; color: #fff; font-family: sans-serif; padding: 20px; }
        .content-section { display: none; }
        #mainMenu { display: flex; flex-direction: column; gap: 10px; }
        .menu-box { background: #1c2541; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; }
        .active { display: block; }
    </style>
</head>
<body onclick="startAudioSystem()">

    <!-- بار الأذان -->
    <div class="azan-bar" style="background:#132247; padding:20px; border-radius:15px; text-align:center;">
        <h3>نظام التنبيهات</h3>
        <button id="azanPlayBtn" onclick="toggleAzan()">▶ تشغيل الأذان</button>
        <p id="azanStatus">اضغط لتفعيل الصوت</p>
    </div>

    <!-- القائمة -->
    <div id="mainMenu">
        <div class="menu-box" onclick="showSection('azkarSection')">الأذكار</div>
    </div>

    <!-- قسم الأذكار -->
    <div id="azkarSection" class="content-section">
        <button onclick="hideSection('azkarSection')">رجوع</button>
        <div id="zkrText" style="margin:20px 0; font-size:1.5rem;">تحميل...</div>
        <button onclick="nextZkr()">التالي</button>
    </div>

    <audio id="azanAudio" src="https://www.islamcan.com/audio/adhan/azan1.mp3"></audio>

    <script>
        // 1. إصلاح مشكلة الصوت
        const audio = document.getElementById("azanAudio");
        let audioContextStarted = false;

        function startAudioSystem() {
            if (!audioContextStarted) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audioContextStarted = true;
                    document.getElementById("azanStatus").innerText = "تم تفعيل الصوت بنجاح ✅";
                }).catch(e => console.log("بانتظار تفاعل المستخدم"));
            }
        }

        function toggleAzan() {
            if (audio.paused) {
                audio.play();
                document.getElementById("azanPlayBtn").innerText = "⏸ إيقاف";
            } else {
                audio.pause();
                audio.currentTime = 0;
                document.getElementById("azanPlayBtn").innerText = "▶ تشغيل الأذان";
            }
        }

        // 2. إصلاح بيانات الأذكار (تأكدنا من سلامة الأقواس)
        const azkarData = {
            morning: [
                { text: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ", count: 1 },
                { text: "بسم الله الذي لا يضر مع اسمه شيء", count: 3 }
            ]
        };

        // 3. دوال التنقل
        let zkrIndex = 0;
        function showSection(id) {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            updateZkr();
        }

        function hideSection(id) {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById(id).style.display = 'none';
        }

        function updateZkr() {
            document.getElementById('zkrText').innerText = azkarData.morning[zkrIndex].text;
        }

        function nextZkr() {
            zkrIndex = (zkrIndex + 1) % azkarData.morning.length;
            updateZkr();
        }

        // 4. تصحيح التوقيت
        setInterval(() => {
            const now = new Date();
            // يمكنك إضافة منطق المقارنة هنا لتشغيل الأذان تلقائياً
        }, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الآذان</title>
    <style>
        body { background: #0a1128; color: white; display: flex; justify-content: center; padding-top: 50px; font-family: sans-serif; }
        .box { background: #1c2541; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #00b4d8; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #00b4d8; border: none; border-radius: 10px; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h3>نظام الآذان التلقائي</h3>
        <p id="msg">اضغط في أي مكان بالصفحة أولاً، ثم اضغط زر التشغيل</p>
        <button id="playBtn" onclick="tryPlay()">▶ استماع تجريبي</button>
    </div>

    <!-- رابط مباشر ومضمون -->
    <audio id="audioPlayer" src="https://archive.org/download/Adhan_Madinah/Adhan_Madinah.mp3" preload="auto"></audio>

    <script>
        const audio = document.getElementById("audioPlayer");
        const btn = document.getElementById("playBtn");
        let isUnlocked = false;

        // وظيفة لفك قفل الصوت عند أول ضغطة في الصفحة
        document.body.addEventListener('click', () => {
            if (!isUnlocked) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    isUnlocked = true;
                    document.getElementById("msg").innerText = "تم تفعيل الصوت بنجاح! اضغط الاستماع الآن";
                }).catch(e => console.log("بانتظار تفاعل المستخدم"));
            }
        }, { once: true });

        function tryPlay() {
            if (audio.paused) {
                audio.play().catch(e => alert("اضغط في أي مكان بالصفحة أولاً للسماح بالصوت"));
                btn.innerText = "⏸ إيقاف";
            } else {
                audio.pause();
                audio.currentTime = 0;
                btn.innerText = "▶ استماع تجريبي";
            }
        }

        audio.onended = () => { btn.innerText = "▶ استماع تجريبي"; };
    </script>
</body>
</html>

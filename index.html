<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دينك</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* تعديل العنوان الرئيسي كما طلبت */
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        .azan-bar {
            background: linear-gradient(135deg, #132247, #1c2541);
            border: 1px solid var(--primary-color);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .azan-title { font-weight: bold; color: var(--accent-color); font-size: 1.2rem; margin-bottom: 10px; }
        .azan-status { font-size: 0.9rem; color: #94a3b8; }
        
        .prayer-times-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .prayer-item { text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .prayer-name { color: #94a3b8; font-size: 0.9rem; }
        .prayer-time { font-weight: bold; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>دينك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">موسوعة السيرة النبوية وبستان الصحابة الأجلاء</p>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div class="azan-title">نظام المواقيت والآذان التلقائي 🕌</div>
            <div class="azan-status">انقر فوق أي مكان بالشاشة لتنشيط نظام الأذن التلقائي بالكامل 🔔</div>
            
            <div class="prayer-times-grid">
                <div class="prayer-item"><div class="prayer-name">المغرب</div><div class="prayer-time">07:55 م</div></div>
                <div class="prayer-item"><div class="prayer-name">العصر</div><div class="prayer-time">04:30 م</div></div>
                <div class="prayer-item"><div class="prayer-name">الظهر</div><div class="prayer-time">12:55 م</div></div>
                <div class="prayer-item"><div class="prayer-name">الفجر</div><div class="prayer-time">04:10 ص</div></div>
            </div>
        </div>
    </div>

</body>
</html>

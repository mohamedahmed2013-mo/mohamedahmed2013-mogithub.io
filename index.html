<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دينك</title>
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #1c2541;
            --text-color: #f8fafc;
            --primary-color: #00b4d8;
            --accent-color: #00f5d4;
            --highlight: #ffd166;
            --success-color: #2a9d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { text-align: center; margin: 20px 0 30px 0; }
        header h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        
        .azan-bar { background: linear-gradient(135deg, #132247, #1c2541); border: 1px solid var(--primary-color); border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .prayer-times-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .prayer-item { text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        
        .menu-box { background: var(--card-bg); border-radius: 15px; padding: 25px; text-align: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .menu-box:hover { border-color: var(--primary-color); background: #222f54; }
        
        .content-section { display: none; background: var(--card-bg); border-radius: 20px; padding: 25px; }
        .back-btn { font-size: 0.9rem; padding: 5px 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>دينك 🤍</h1>
        <p style="margin-top:5px; color: #94a3b8;">موسوعة السيرة النبوية وبستان الصحابة الأجلاء</p>
    </header>

    <div class="main-container">
        <div class="azan-bar">
            <div style="color: var(--accent-color); font-weight: bold; margin-bottom: 10px;">نظام المواقيت والآذان التلقائي 🕌</div>
            <div class="prayer-times-grid">
                <div class="prayer-item"><div style="font-size: 0.8rem;">الفجر</div><div style="font-weight: bold;">04:10</div></div>
                <div class="prayer-item"><div style="font-size: 0.8rem;">الظهر</div><div style="font-weight: bold;">12:55</div></div>
                <div class="prayer-item"><div style="font-size: 0.8rem;">العصر</div><div style="font-weight: bold;">04:30</div></div>
                <div class="prayer-item"><div style="font-size: 0.8rem;">المغرب</div><div style="font-weight: bold;">07:55</div></div>
                <div class="prayer-item"><div style="font-size: 0.8rem;">العشاء</div><div style="font-weight: bold;">09:30</div></div>
            </div>
        </div>

        <div id="mainMenu" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="menu-box" onclick="alert('جارٍ فتح الأذكار...')">🌅 الأذكار اليومية والورد المحصن</div>
            <div class="menu-box" onclick="alert('جارٍ فتح محرك المشاعر...')">🩹 محرك المشاعر والأمان النفسي</div>
            <div class="menu-box" onclick="alert('جارٍ فتح موسوعة الصحابة...')">🕌 سير الصحابة العظماء</div>
        </div>
    </div>

    <script>
        // يمكنك إضافة وظائف JavaScript هنا لاحقاً لتفعيل الأزرار
        console.log("تم تحميل الصفحة بنجاح");
    </script>
</body>
</html>

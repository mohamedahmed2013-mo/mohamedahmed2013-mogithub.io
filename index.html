<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طمئن قلبك</title>
</head>
<body style="background:#0a1128; color:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">

    <h1>نظام الآذان</h1>
    
    <audio id="azan" controls>
        <source src="https://server11.mp3quran.net/adhan/001.mp3" type="audio/mpeg">
    </audio>

    <p>اضغط على زر التشغيل (المثلث) في الشريط أعلاه.</p>

    <script>
        // هذا الجزء فقط للتشغيل التلقائي الذي قد يسمح به المتصفح
        window.addEventListener('click', () => {
            const audio = document.getElementById('azan');
            audio.play().catch(() => {});
        }, { once: true });
    </script>
</body>
</html>
